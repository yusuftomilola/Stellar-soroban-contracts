name: Security Symbolic Analysis
on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  symbolic-analysis:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install regex
    
    - name: Run Symbolic Analysis
      run: |
        python symbolic_analysis.py --all-contracts --config analysis_config.json --output security_report.json
    
    - name: Upload Security Report
      uses: actions/upload-artifact@v3
      if: always()
      with:
        name: security-analysis-report
        path: security_report.json
    
    - name: Display Summary
      if: always()
      run: |
        echo "## Security Analysis Summary" >> $GITHUB_STEP_SUMMARY
        python -c "
        import json
        try:
            with open('security_report.json', 'r') as f:
                report = json.load(f)
            summary = report['summary']
            print(f'- Contracts analyzed: {summary[\"contracts_analyzed\"]}')
            print(f'- Total vulnerabilities: {summary[\"total_vulnerabilities\"]}')
            print(f'- Critical: {summary[\"critical\"]}')
            print(f'- High: {summary[\"high\"]}')
            print(f'- Medium: {summary[\"medium\"]}')
            print(f'- Low: {summary[\"low\"]}')
            
            if summary['critical'] > 0 or summary['high'] > 0:
                print('\\n### High Priority Issues')
                for vuln in report['vulnerabilities']:
                    if vuln['severity'] in ['critical', 'high']:
                        print(f'- **[{vuln[\"severity\"].upper()}]** {vuln[\"type\"]} in {vuln[\"contract\"]}::{vuln[\"function\"]}')
                        print(f'  - {vuln[\"description\"]}')
        except Exception as e:
            print(f'Error reading report: {e}')
        " >> $GITHUB_STEP_SUMMARY
